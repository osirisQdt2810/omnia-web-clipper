<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Omnia Web Clipper</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        color: #1c1f23;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        margin: 10px 0;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #b6bcc3;
        flex: 0 0 auto;
      }
      .dot.ok {
        background: #1f8a4c;
      }
      .dot.err {
        background: #c0392b;
      }
      .detail {
        font-size: 11px;
        color: #7a828c;
        margin: 0 0 12px;
        line-height: 1.4;
      }
      button {
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #cfd6dd;
        background: #eef1f5;
        cursor: pointer;
        width: 100%;
      }
      .tip {
        font-size: 11px;
        color: #7a828c;
        margin-top: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <h1>Omnia Web Clipper</h1>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Checking AnkiConnect…</span>
    </div>
    <p class="detail" id="detail"></p>
    <button id="optionsBtn">Open options</button>
    <p class="tip">
      Select a word or phrase on any page, then click the floating "+" to add it to Anki.
    </p>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
